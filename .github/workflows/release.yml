name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            ext: ".exe"
          - target: aarch64-apple-darwin
            os: macos-latest
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $bin = "target/${{ matrix.target }}/release/claude-session-mgr.exe"
          Compress-Archive -Path $bin -DestinationPath claude-session-mgr-${{ matrix.target }}.zip

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          tar -czf claude-session-mgr-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release claude-session-mgr

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: claude-session-mgr-${{ matrix.target }}
          path: claude-session-mgr-${{ matrix.target }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
